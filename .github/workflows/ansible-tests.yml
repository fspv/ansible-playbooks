---
name: ansible-tests

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'

jobs:
  hetzner-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - playbook: user.yml
            suffix: user
            server_type: cx22
            image: ubuntu-24.04
          - playbook: common-desktop.yml
            suffix: common-desktop
            server_type: cx22
            image: ubuntu-24.04
          - playbook: common-devserver.yml
            suffix: common-devserver
            server_type: cx22
            image: ubuntu-24.04
          - playbook: common-devserver.yml
            suffix: common-devserver-arm64
            server_type: cax11
            image: ubuntu-24.04
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      VM_NAME: ci-ansible-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.suffix }}-${{ matrix.image }}
      SSH: >-
        ssh
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o LogLevel=ERROR
        -o ConnectTimeout=10
        -o BatchMode=yes
        -i /home/runner/.ssh/id_ci_ansible
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: resolve latest hcloud version
        run: |
          version=$(curl -fsSLI -o /dev/null -w '%{url_effective}' \
            https://github.com/hetznercloud/cli/releases/latest | sed 's|.*/||')
          echo "HCLOUD_VERSION=$version" >> "$GITHUB_ENV"

      - name: install hcloud cli
        run: |
          curl -fsSL "https://github.com/hetznercloud/cli/releases/download/${HCLOUD_VERSION}/hcloud-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin hcloud

      - name: verify hcloud cli
        run: hcloud version

      - name: ensure ~/.ssh exists
        run: mkdir -p /home/runner/.ssh

      - name: lock down ~/.ssh perms
        run: chmod 700 /home/runner/.ssh

      - name: write ssh private key
        env:
          CI_SSH_PRIVATE_KEY: ${{ secrets.CI_SSH_PRIVATE_KEY }}
        # GitHub masks the secret in logs; do not enable shell tracing here.
        run: printf '%s\n' "${CI_SSH_PRIVATE_KEY}" > /home/runner/.ssh/id_ci_ansible

      - name: lock down ssh key perms
        run: chmod 600 /home/runner/.ssh/id_ci_ansible

      - name: create VM
        env:
          HCLOUD_LOCATION: ${{ secrets.HCLOUD_LOCATION }}
          HCLOUD_SSH_KEY_NAME: ${{ secrets.HCLOUD_SSH_KEY_NAME }}
        run: |
          hcloud server create \
            --name "$VM_NAME" \
            --type "${{ matrix.server_type }}" \
            --image "${{ matrix.image }}" \
            --location "$HCLOUD_LOCATION" \
            --ssh-key "$HCLOUD_SSH_KEY_NAME" \
            --label purpose=ci \
            --label run_id=${{ github.run_id }} \
            --label run_attempt=${{ github.run_attempt }} \
            --label suffix=${{ matrix.suffix }} \
            --label image=${{ matrix.image }}

      - name: resolve VM IP
        run: echo "IP=$(hcloud server ip "$VM_NAME")" >> "$GITHUB_ENV"

      - name: wait for ssh
        run: |
          for i in $(seq 1 60); do
            if $SSH "root@$IP" true 2>/dev/null; then
              echo "SSH ready after attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "SSH did not become ready within 5 minutes" >&2
          exit 1

      - name: sync repo to VM
        run: rsync -az --delete -e "$SSH" ./ "root@$IP:/root/ansible-playbooks/"

      - name: clean manual dir on VM
        run: $SSH "root@$IP" "rm -rf /root/ansible-playbooks/manual"

      - name: create manual dir on VM
        run: $SSH "root@$IP" "mkdir /root/ansible-playbooks/manual"

      - name: generate manual/common.yml on VM
        run: $SSH "root@$IP" "cd /root/ansible-playbooks && sed 's/# //g' roles/user/defaults/main.yml > manual/common.yml"

      - name: run bootstrap on VM
        env:
          PLAYBOOK: ${{ matrix.playbook }}
        run: $SSH "root@$IP" "cd /root/ansible-playbooks && ./bootstrap.sh '$PLAYBOOK' LOCAL"

      - name: apt update on VM
        run: $SSH "root@$IP" "apt-get update"

      - name: apt upgrade on VM
        run: $SSH "root@$IP" "apt-get -y upgrade"

      - name: apt dist-upgrade on VM
        run: $SSH "root@$IP" "apt-get -y dist-upgrade"

      - name: apt upgrade on VM (final)
        run: $SSH "root@$IP" "apt-get -y upgrade"

      - name: apt autoremove on VM
        run: $SSH "root@$IP" "apt-get -y autoremove"

      - name: destroy VM
        if: always()
        run: hcloud server delete "$VM_NAME"
