---
name: _hetzner-test

on:
  workflow_call:
    inputs:
      playbook:
        type: string
        required: true
      suffix:
        type: string
        required: true
      server_type:
        type: string
        required: true
      image:
        type: string
        required: true
      arch:
        type: string
        required: true
      run_e2e:
        type: boolean
        required: false
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      VM_NAME: ci-ansible-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.suffix }}-${{ inputs.image }}
      SSH: >-
        ssh
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o LogLevel=ERROR
        -o ConnectTimeout=10
        -o BatchMode=yes
        -i /home/runner/.ssh/id_ci_ansible
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: resolve latest hcloud version
        run: |
          version=$(curl -fsSLI -o /dev/null -w '%{url_effective}' \
            https://github.com/hetznercloud/cli/releases/latest | sed 's|.*/||')
          echo "HCLOUD_VERSION=$version" >> "$GITHUB_ENV"

      - name: install hcloud cli
        run: |
          curl -fsSL "https://github.com/hetznercloud/cli/releases/download/${HCLOUD_VERSION}/hcloud-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin hcloud

      - name: verify hcloud cli
        run: hcloud version

      - name: ensure ~/.ssh exists
        run: mkdir -p /home/runner/.ssh

      - name: lock down ~/.ssh perms
        run: chmod 700 /home/runner/.ssh

      - name: write ssh private key
        env:
          CI_SSH_PRIVATE_KEY: ${{ secrets.CI_SSH_PRIVATE_KEY }}
        # GitHub masks the secret in logs; do not enable shell tracing here.
        run: printf '%s\n' "${CI_SSH_PRIVATE_KEY}" > /home/runner/.ssh/id_ci_ansible

      - name: lock down ssh key perms
        run: chmod 600 /home/runner/.ssh/id_ci_ansible

      - name: derive ssh public key
        run: ssh-keygen -y -f /home/runner/.ssh/id_ci_ansible > /home/runner/.ssh/id_ci_ansible.pub

      - name: write cloud-init user-data
        run: |
          pubkey=$(cat /home/runner/.ssh/id_ci_ansible.pub)
          cat > /tmp/user-data.yaml <<EOF
          #cloud-config
          users:
            - name: ubuntu
              sudo: ALL=(ALL) NOPASSWD:ALL
              shell: /bin/bash
              groups: [sudo]
              ssh_authorized_keys:
                - ${pubkey}
          EOF

      - name: create VM
        env:
          HCLOUD_LOCATION: ${{ secrets.HCLOUD_LOCATION }}
          HCLOUD_SSH_KEY_NAME: ${{ secrets.HCLOUD_SSH_KEY_NAME }}
        run: |
          hcloud server create \
            --name "$VM_NAME" \
            --type "${{ inputs.server_type }}" \
            --image "${{ inputs.image }}" \
            --location "$HCLOUD_LOCATION" \
            --ssh-key "$HCLOUD_SSH_KEY_NAME" \
            --user-data-from-file /tmp/user-data.yaml \
            --label purpose=ci \
            --label run_id=${{ github.run_id }} \
            --label run_attempt=${{ github.run_attempt }} \
            --label suffix=${{ inputs.suffix }} \
            --label image=${{ inputs.image }}

      - name: resolve VM IP
        run: echo "IP=$(hcloud server ip "$VM_NAME")" >> "$GITHUB_ENV"

      - name: wait for ssh
        run: |
          for i in $(seq 1 60); do
            if $SSH "ubuntu@$IP" true 2>/dev/null; then
              echo "SSH ready after attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "SSH did not become ready within 5 minutes" >&2
          exit 1

      - name: sync repo to VM
        run: rsync -az --delete -e "$SSH" ./ "ubuntu@$IP:/home/ubuntu/ansible-playbooks/"

      - name: clean manual dir on VM
        run: $SSH "ubuntu@$IP" "rm -rf /home/ubuntu/ansible-playbooks/manual"

      - name: create manual dir on VM
        run: $SSH "ubuntu@$IP" "mkdir /home/ubuntu/ansible-playbooks/manual"

      - name: generate manual/common.yml on VM
        run: $SSH "ubuntu@$IP" "cd /home/ubuntu/ansible-playbooks && sed 's/# //g' roles/user/defaults/main.yml > manual/common.yml"

      - name: run bootstrap on VM
        env:
          PLAYBOOK: ${{ inputs.playbook }}
        run: $SSH "ubuntu@$IP" "cd /home/ubuntu/ansible-playbooks && ./bootstrap.sh '$PLAYBOOK' LOCAL"

      - name: apt update on VM
        run: $SSH "ubuntu@$IP" "sudo apt-get update"

      - name: apt upgrade on VM
        run: $SSH "ubuntu@$IP" "sudo apt-get -y upgrade"

      - name: apt dist-upgrade on VM
        run: $SSH "ubuntu@$IP" "sudo apt-get -y dist-upgrade"

      - name: apt upgrade on VM (final)
        run: $SSH "ubuntu@$IP" "sudo apt-get -y upgrade"

      - name: apt autoremove on VM
        run: $SSH "ubuntu@$IP" "sudo apt-get -y autoremove"

      - name: reboot VM
        run: hcloud server reboot "$VM_NAME"

      - name: wait for ssh after reboot
        run: |
          sleep 15
          for i in $(seq 1 60); do
            if $SSH "ubuntu@$IP" true 2>/dev/null; then
              echo "SSH ready after reboot, attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "SSH did not become ready within 5 minutes after reboot" >&2
          exit 1

      - name: re-run bootstrap on VM after reboot
        env:
          PLAYBOOK: ${{ inputs.playbook }}
        run: $SSH "ubuntu@$IP" "cd /home/ubuntu/ansible-playbooks && ./bootstrap.sh '$PLAYBOOK' LOCAL"

      - name: download e2e archive
        if: ${{ inputs.run_e2e }}
        uses: actions/download-artifact@v4
        with:
          name: e2e-${{ inputs.arch }}
          path: /tmp/e2e

      - name: copy e2e archive to VM
        if: ${{ inputs.run_e2e }}
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o LogLevel=ERROR \
            -i /home/runner/.ssh/id_ci_ansible \
            "/tmp/e2e/e2e-${{ inputs.arch }}.tar.zst" \
            "ubuntu@$IP:/home/ubuntu/e2e.tar.zst"

      - name: install cargo-nextest on VM
        if: ${{ inputs.run_e2e }}
        env:
          NEXTEST_PLATFORM: ${{ inputs.arch == 'arm64' && 'linux-arm' || 'linux' }}
        run: |
          $SSH "ubuntu@$IP" "mkdir -p \$HOME/.local/bin && curl -fsSL https://get.nexte.st/latest/$NEXTEST_PLATFORM | tar -xz -C \$HOME/.local/bin"

      - name: run e2e tests on VM
        if: ${{ inputs.run_e2e }}
        env:
          REMOTE_CMD: >-
            cd /home/ubuntu/ansible-playbooks/e2e-tests &&
            $HOME/.local/bin/cargo-nextest nextest run
            --archive-file /home/ubuntu/e2e.tar.zst
            --workspace-remap /home/ubuntu/ansible-playbooks/e2e-tests
        run: $SSH "ubuntu@$IP" "$REMOTE_CMD"

      - name: destroy VM
        if: always()
        run: hcloud server delete "$VM_NAME"
